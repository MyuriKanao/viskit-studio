# Cross-vendor swap fixture #3: anthropic_compatible @ Anthropic endpoint for llm/vision
# image_gen / image_edit / embedding still route through openai_compatible since
# Anthropic Messages API has no image-gen or embedding endpoints.
providers:
  vision:
    protocol: anthropic_compatible
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    model: claude-opus-4-7

  llm:
    protocol: anthropic_compatible
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    model: claude-opus-4-7

  image_gen:
    protocol: openai_compatible
    base_url: https://api.apimart.ai/v1
    api_key_env: APIMART_API_KEY
    model: gpt-image-2

  image_edit:
    protocol: openai_compatible
    base_url: https://api.apimart.ai/v1
    api_key_env: APIMART_API_KEY
    model: gpt-image-2-edit

  embedding:
    protocol: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: nvidia/llama-nemotron-embed-vl-1b-v2

  compliance_screen:
    protocol: anthropic_compatible
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    model: claude-haiku-4-5-20251001
