# Color-lock ΔE-2000 fixtures — 24 hand-labelled entries spanning 5 scenario tags.
#
# Each entry models a single :func:`services.imagegen.color_lock.verify` call.
# The test synthesises a PIL image from `dominant_color_hex` + (optional)
# `secondary_color_hex` and `primary_ratio`, then asserts the agreement
# between the verifier's output and `expected_locked`.
#
# Scenario tags:
#   solid           — single colour
#   low_saturation  — grey / pale colour with low chroma
#   multi_color     — two-colour stripe split via primary_ratio
#   noise           — primary colour with ~5% scattered off-colour pixels
#   edge_case       — Δ<1 (locked) or Δ>30 (not locked) boundary tests
#
# Acceptance bar: ≥18/24 agreement (≥75%). Plan AC says "≥18/20" — we ship 24
# entries so the test can tolerate the documented ≤2 colorthief quantisation
# slips and still pass.

fixtures:
  # --- solid (5) ----------------------------------------------------------
  - id: solid-exact-red
    target_hex: "#C4513A"
    dominant_color_hex: "#C4513A"
    scenario_tag: solid
    expected_locked: true
  - id: solid-near-red
    target_hex: "#C4513A"
    dominant_color_hex: "#C8503C"
    scenario_tag: solid
    expected_locked: true
  - id: solid-far-green
    target_hex: "#C4513A"
    dominant_color_hex: "#1A8A4F"
    scenario_tag: solid
    expected_locked: false
  - id: solid-far-blue
    target_hex: "#3A4AC4"
    dominant_color_hex: "#C4513A"
    scenario_tag: solid
    expected_locked: false
  - id: solid-white-vs-black
