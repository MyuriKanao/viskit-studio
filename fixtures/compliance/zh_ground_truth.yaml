# The scorer must agree on detected rule-id sets with ≥ 90% of these pairs
# globally, and ≥ 80% per tier.
#
# Tier label meanings (must match a key in services/copywriter/compliance/rules/zh.yaml):
#   tier_0_general          → universal absolutes
#   tier_1_blue_hat         → 保健食品 batch-licence boundary
#   tier_2_demedicalize     → 运动器材 medicalisation
#   tier_3_general_food     → 普通食品 strictest tier

