# AIShop Image Studio — infrastructure stack
#
# EPIC-0 Risk note (Milvus on Linux):
#   If Milvus fails to start with "permission denied" on the data volume,
#   run: sudo chmod 777 ./milvus_data  (or the named-volume host path under
#   /var/lib/docker/volumes/).  This is a known upstream issue with the
#   milvusdb/milvus image on Linux hosts.

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aishop
      POSTGRES_PASSWORD: aishop
      POSTGRES_DB: aishop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aishop"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO (object storage) ─────────────────────────────────────────────────
  # Defined before Milvus because Milvus depends_on it (even with embedded etcd
  # the image benefits from object-store readiness in some configurations).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO bucket init (one-shot) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/aishop-kits &&
        echo 'Bucket aishop-kits ready.'
      "
    restart: "no"

  # ─── etcd (Milvus coordination — external, not embedded) ───────────────────
  # Embedded etcd in milvusdb/milvus:v2.4.13 segfaults at etcd_server.go:49 on
  # some Linux kernels (zen 7.x). External etcd is Milvus's documented prod
  # config and bypasses the bug.
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      # quay.io/coreos/etcd is distroless (no /bin/sh) — must use CMD form.
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Milvus (vector DB, standalone with EXTERNAL etcd) ─────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.13
    command: milvus run standalone
    environment:
      ETCD_USE_EMBED: "false"
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # gRPC SDK
      - "9091:9091"    # metrics / health
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      minio:
        condition: service_healthy
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Redis (session cache — localhost-only per ADR-011) ─────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"   # bound to loopback only (ADR-011)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  milvus_data:
  redis_data:
  minio_data:
  etcd_data:
