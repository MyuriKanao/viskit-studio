components:
  schemas:
    ComplianceOut:
      properties:
        advisory:
          title: Advisory
          type: boolean
        locale:
          title: Locale
          type: string
        score:
          title: Score
          type: integer
        violations:
          items:
            $ref: '#/components/schemas/ViolationOut'
          title: Violations
          type: array
      required:
        - score
        - violations
        - advisory
        - locale
      title: ComplianceOut
      type: object
    ConfigStateResponse:
      properties:
        sha256:
          title: Sha256
          type: string
        yaml:
          title: Yaml
          type: string
      required:
        - yaml
        - sha256
      title: ConfigStateResponse
      type: object
    CopyTemplateRequest:
      properties:
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        source_ref:
          title: Source Ref
          type: string
      required:
        - source_ref
      title: CopyTemplateRequest
      type: object
    CreateEndpointRequest:
      properties:
        adapter:
          anyOf:
            - type: string
            - type: 'null'
          title: Adapter
        api_key:
          title: Api Key
          type: string
        base_url:
          title: Base Url
          type: string
        model:
          title: Model
          type: string
        name:
          title: Name
          type: string
        protocol:
          enum:
            - openai_compatible
            - anthropic_compatible
            - image_generation
          title: Protocol
          type: string
      required:
        - protocol
        - base_url
        - model
        - name
        - api_key
      title: CreateEndpointRequest
      type: object
    DeleteKitImageResponse:
      properties:
        deleted:
          title: Deleted
          type: boolean
        file_deleted:
          title: File Deleted
          type: boolean
        image_id:
          title: Image Id
          type: string
        kit_id:
          title: Kit Id
          type: integer
      required:
        - kit_id
        - image_id
        - deleted
        - file_deleted
      title: DeleteKitImageResponse
      type: object
    DetailSectionIn:
      properties:
        id:
          enum:
            - M1
            - M2
            - M3
            - M4
            - M5
            - M6
            - M7
            - M8
            - M9
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceIn'
      required:
        - id
        - three_piece
      title: DetailSectionIn
      type: object
    DetailSectionOut:
      properties:
        id:
          enum:
            - M1
            - M2
            - M3
            - M4
            - M5
            - M6
            - M7
            - M8
            - M9
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceOut'
      required:
        - id
        - three_piece
      title: DetailSectionOut
      type: object
    EditAccepted:
      properties:
        job_id:
          title: Job Id
          type: string
      required:
        - job_id
      title: EditAccepted
      type: object
    EditRequest:
      properties:
        kit_id:
          anyOf:
            - pattern: ^[A-Za-z0-9_-]{1,64}$
              type: string
            - type: 'null'
          description: Optional kit id for local edit context; safe-character allowlist keeps sidecar references portable.
          title: Kit Id
        mask_box:
          additionalProperties:
            type: integer
          description: x,y,w,h
          title: Mask Box
          type: object
        new_text:
          title: New Text
          type: string
      required:
        - mask_box
        - new_text
      title: EditRequest
      type: object
    EndpointSecretResponse:
      properties:
        api_key:
          title: Api Key
          type: string
      required:
        - api_key
      title: EndpointSecretResponse
      type: object
    EndpointStanza:
      properties:
        adapter:
          anyOf:
            - type: string
            - type: 'null'
          title: Adapter
        api_key_env:
          title: Api Key Env
          type: string
        base_url:
          title: Base Url
          type: string
        model:
          title: Model
          type: string
        protocol:
          title: Protocol
          type: string
      required:
        - protocol
        - base_url
        - api_key_env
        - model
      title: EndpointStanza
      type: object
    ExtractRequest:
      properties:
        description:
          anyOf:
            - maxLength: 2000
              type: string
            - type: 'null'
          title: Description
        image_url:
          maxLength: 12000000
          title: Image Url
          type: string
      required:
        - image_url
      title: ExtractRequest
      type: object
    ExtractResponse:
      properties:
        brand:
          $ref: '#/components/schemas/FieldInference'
        brand_color_hex:
          $ref: '#/components/schemas/FieldInference'
        category:
          $ref: '#/components/schemas/FieldInference'
        name:
          anyOf:
            - $ref: '#/components/schemas/FieldInference'
            - type: 'null'
        price:
          anyOf:
            - $ref: '#/components/schemas/FieldInference'
            - type: 'null'
        product_type:
          $ref: '#/components/schemas/FieldInference'
        selling_points:
          items:
            $ref: '#/components/schemas/FieldInference'
          title: Selling Points
          type: array
      required:
        - name
        - brand
        - category
        - product_type
        - price
        - brand_color_hex
        - selling_points
      title: ExtractResponse
      type: object
    FieldInference:
      properties:
        confidence:
          maximum: 1
          minimum: 0
          title: Confidence
          type: number
        reasoning:
          title: Reasoning
          type: string
        value:
          title: Value
      required:
        - value
        - confidence
        - reasoning
      title: FieldInference
      type: object
    GenerateRequest:
      properties:
        brand_color_hex:
          pattern: ^#[0-9A-Fa-f]{6}$
          title: Brand Color Hex
          type: string
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        retrieved_bestseller_ids:
          items:
            type: integer
          title: Retrieved Bestseller Ids
          type: array
        spec:
          $ref: '#/components/schemas/SpecIn'
        style_prompt:
          anyOf:
            - type: string
            - type: 'null'
          title: Style Prompt
        template_scheme_ref:
          anyOf:
            - type: string
            - type: 'null'
          title: Template Scheme Ref
        template_slot_overrides:
          additionalProperties:
            type: string
          title: Template Slot Overrides
          type: object
      required:
        - spec
        - brand_color_hex
        - locale
      title: GenerateRequest
      type: object
    GenerateResponse:
      properties:
        abort_reason:
          anyOf:
            - type: string
            - type: 'null'
          title: Abort Reason
        color_lock_summary:
          additionalProperties:
            type: integer
          title: Color Lock Summary
          type: object
        compliance_path:
          title: Compliance Path
          type: string
        cost_path:
          title: Cost Path
          type: string
        db_kit_id:
          title: Db Kit Id
          type: integer
        kit_id:
          title: Kit Id
          type: string
        needs_review:
          title: Needs Review
          type: boolean
        png_paths:
          items:
            type: string
          title: Png Paths
          type: array
      required:
        - kit_id
        - db_kit_id
        - png_paths
        - compliance_path
        - cost_path
        - color_lock_summary
        - needs_review
      title: GenerateResponse
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HeroSectionIn:
      properties:
        id:
          enum:
            - H1
            - H2
            - H3
            - H4
            - H5
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceIn'
      required:
        - id
        - three_piece
      title: HeroSectionIn
      type: object
    HeroSectionOut:
      properties:
        id:
          enum:
            - H1
            - H2
            - H3
            - H4
            - H5
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceOut'
      required:
        - id
        - three_piece
      title: HeroSectionOut
      type: object
    KitListItem:
      properties:
        category:
          anyOf:
            - type: string
            - type: 'null'
          title: Category
        id:
          title: Id
          type: integer
        locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Locale
        name:
          title: Name
          type: string
        name_en:
          anyOf:
            - type: string
            - type: 'null'
          title: Name En
        score:
          anyOf:
            - type: integer
            - type: 'null'
          title: Score
        sku:
          title: Sku
          type: string
        status:
          title: Status
          type: string
        thumbs:
          items:
            anyOf:
              - type: string
              - type: 'null'
          title: Thumbs
          type: array
        updated_at:
          anyOf:
            - type: string
            - type: 'null'
          title: Updated At
      required:
        - id
        - sku
        - name
        - name_en
        - status
        - score
        - locale
        - thumbs
      title: KitListItem
      type: object
    KitListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/KitListItem'
          title: Items
          type: array
        total:
          title: Total
          type: integer
      required:
        - items
        - total
      title: KitListResponse
      type: object
    KitMetaResponse:
      description: Side-car payload for kit detail and the EPIC-9 Catalog drawer.
      properties:
        compliance:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Compliance
        cost:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Cost
        db_kit_id:
          title: Db Kit Id
          type: integer
        kit_id:
          anyOf:
            - type: string
            - type: 'null'
          title: Kit Id
        retrieved_bestseller_ids:
          items:
            type: integer
          title: Retrieved Bestseller Ids
          type: array
        spec:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Spec
        spec_markdown:
          anyOf:
            - type: string
            - type: 'null'
          title: Spec Markdown
      required:
        - db_kit_id
        - retrieved_bestseller_ids
      title: KitMetaResponse
      type: object
    OcrResponse:
      properties:
        boxes:
          items:
            $ref: '#/components/schemas/TextBoxOut'
          title: Boxes
          type: array
        engine:
          title: Engine
          type: string
        version:
          title: Version
          type: string
      required:
        - boxes
        - engine
        - version
      title: OcrResponse
      type: object
    OnboardingNeededResponse:
      properties:
        needs_onboarding:
          title: Needs Onboarding
          type: boolean
      required:
        - needs_onboarding
      title: OnboardingNeededResponse
      type: object
    PreviewRequest:
      properties:
        brand_color_hex:
          default: '#C4513A'
          pattern: ^#[0-9A-Fa-f]{6}$
          title: Brand Color Hex
          type: string
        copy:
          default: 新品上市
          title: Copy
          type: string
        design_note:
          default: keep product centered with premium spacing
          title: Design Note
          type: string
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        sample_brand:
          default: 示例品牌
          title: Sample Brand
          type: string
        sample_category:
          default: 服饰
          title: Sample Category
          type: string
        sample_name:
          default: 示例商品
          title: Sample Name
          type: string
        style_prompt:
          default: warm minimalist studio, soft daylight
          title: Style Prompt
          type: string
        template_ref:
          title: Template Ref
          type: string
        visual:
          default: single product hero image, clean ecommerce composition
          title: Visual
          type: string
      required:
        - template_ref
        - locale
      title: PreviewRequest
      type: object
    PreviewResponse:
      properties:
        cost_usd:
          title: Cost Usd
          type: number
        png_path:
          anyOf:
            - type: string
            - type: 'null'
          title: Png Path
        prompt:
          title: Prompt
          type: string
      required:
        - prompt
        - png_path
        - cost_usd
      title: PreviewResponse
      type: object
    ProbeCandidateRequest:
      properties:
        adapter:
          anyOf:
            - type: string
            - type: 'null'
          title: Adapter
        api_key:
          anyOf:
            - type: string
            - type: 'null'
          title: Api Key
        api_key_env:
          anyOf:
            - type: string
            - type: 'null'
          title: Api Key Env
        base_url:
          title: Base Url
          type: string
        protocol:
          enum:
            - openai_compatible
            - anthropic_compatible
            - image_generation
          title: Protocol
          type: string
      required:
        - protocol
        - base_url
      title: ProbeCandidateRequest
      type: object
    ProbeCandidateResponse:
      properties:
        error:
          anyOf:
            - type: string
            - type: 'null'
          title: Error
        latency_ms:
          title: Latency Ms
          type: integer
        models:
          items:
            type: string
          title: Models
          type: array
        ok:
          title: Ok
          type: boolean
      required:
        - ok
        - latency_ms
        - models
      title: ProbeCandidateResponse
      type: object
    ProviderHealthRow:
      properties:
        base_url:
          anyOf:
            - type: string
            - type: 'null'
          title: Base Url
        endpoint_id:
          title: Endpoint Id
          type: string
        last_check:
          anyOf:
            - type: string
            - type: 'null'
          title: Last Check
        latency_ms:
          anyOf:
            - type: integer
            - type: 'null'
          title: Latency Ms
        role:
          title: Role
          type: string
        status:
          anyOf:
            - enum:
                - ok
                - warn
                - error
              type: string
            - type: 'null'
          title: Status
        unbound:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Unbound
      required:
        - endpoint_id
        - role
        - base_url
        - status
        - latency_ms
        - last_check
      title: ProviderHealthRow
      type: object
    ProviderProbeResponse:
      properties:
        rows:
          items:
            $ref: '#/components/schemas/ProviderProbeRow'
          title: Rows
          type: array
      required:
        - rows
      title: ProviderProbeResponse
      type: object
    ProviderProbeRow:
      properties:
        error:
          anyOf:
            - type: string
            - type: 'null'
          title: Error
        latency_ms:
          title: Latency Ms
          type: integer
        models:
          items:
            type: string
          title: Models
          type: array
        ok:
          title: Ok
          type: boolean
        role:
          title: Role
          type: string
      required:
        - role
        - ok
        - latency_ms
        - models
      title: ProviderProbeRow
      type: object
    ProvidersSummaryResponse:
      properties:
        brand_color:
          anyOf:
            - type: string
            - type: 'null'
          title: Brand Color
        default_locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Default Locale
        endpoints_count:
          title: Endpoints Count
          type: integer
        export_preset:
          anyOf:
            - type: string
            - type: 'null'
          title: Export Preset
        monthly_cap_usd:
          anyOf:
            - type: number
            - type: 'null'
          title: Monthly Cap Usd
      required:
        - endpoints_count
        - monthly_cap_usd
        - brand_color
        - default_locale
        - export_preset
      title: ProvidersSummaryResponse
      type: object
    QueueJob:
      properties:
        current_stage:
          title: Current Stage
          type: string
        eta_ms:
          title: Eta Ms
          type: integer
        kit_id:
          title: Kit Id
          type: string
        locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Locale
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        sku:
          anyOf:
            - type: string
            - type: 'null'
          title: Sku
        stages:
          items:
            enum:
              - done
              - active
              - queued
            type: string
          title: Stages
          type: array
      required:
        - kit_id
        - sku
        - name
        - locale
        - stages
        - current_stage
        - eta_ms
      title: QueueJob
      type: object
    SaveEndpointsRequest:
      properties:
        expected_sha256:
          title: Expected Sha256
          type: string
        new_yaml:
          title: New Yaml
          type: string
      required:
        - new_yaml
        - expected_sha256
      title: SaveEndpointsRequest
      type: object
    SaveEndpointsResponse:
      properties:
        new_sha256:
          title: New Sha256
          type: string
        registry_rebooted:
          default: true
          title: Registry Rebooted
          type: boolean
        warning:
          anyOf:
            - type: string
            - type: 'null'
          title: Warning
      required:
        - new_sha256
      title: SaveEndpointsResponse
      type: object
    SchemePayload:
      properties:
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        enabled:
          default: true
          title: Enabled
          type: boolean
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        name:
          minLength: 1
          title: Name
          type: string
        slots:
          items:
            $ref: '#/components/schemas/SchemeSlot'
          maxItems: 14
          minItems: 14
          title: Slots
          type: array
      required:
        - locale
        - name
        - slots
      title: SchemePayload
      type: object
    SchemeSlot:
      properties:
        slot_id:
          enum:
            - H1
            - H2
            - H3
            - H4
            - H5
            - M1
            - M2
            - M3
            - M4
            - M5
            - M6
            - M7
            - M8
            - M9
          title: Slot Id
          type: string
        template_ref:
          title: Template Ref
          type: string
      required:
        - slot_id
        - template_ref
      title: SchemeSlot
      type: object
    SchemeSummary:
      properties:
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        editable:
          default: true
          title: Editable
          type: boolean
        enabled:
          default: true
          title: Enabled
          type: boolean
        id:
          title: Id
          type: string
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        name:
          title: Name
          type: string
        slots:
          items:
            $ref: '#/components/schemas/SchemeSlot'
          title: Slots
          type: array
        source:
          default: custom
          enum:
            - built_in
            - custom
          title: Source
          type: string
      required:
        - id
        - name
        - locale
        - slots
      title: SchemeSummary
      type: object
    SellingPointIn:
      properties:
        evidence:
          title: Evidence
          type: string
        priority:
          enum:
            - high
            - medium
            - low
          title: Priority
          type: string
        title:
          title: Title
          type: string
      required:
        - title
        - priority
        - evidence
      title: SellingPointIn
      type: object
    SettingsResponse:
      description: Post-write snapshot of the 4 workspace-level fields.
      properties:
        brand_color:
          anyOf:
            - type: string
            - type: 'null'
          title: Brand Color
        default_locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Default Locale
        export_preset:
          anyOf:
            - type: string
            - type: 'null'
          title: Export Preset
        monthly_cap_usd:
          anyOf:
            - type: number
            - type: 'null'
          title: Monthly Cap Usd
      required:
        - brand_color
        - default_locale
        - monthly_cap_usd
        - export_preset
      title: SettingsResponse
      type: object
    SettingsUpdate:
      description: All four fields optional — only the provided keys get merged.
      properties:
        brand_color:
          anyOf:
            - type: string
            - type: 'null'
          title: Brand Color
        default_locale:
          anyOf:
            - enum:
                - zh
                - en
              type: string
            - type: 'null'
          title: Default Locale
        export_preset:
          anyOf:
            - type: string
            - type: 'null'
          title: Export Preset
        monthly_cap_usd:
          anyOf:
            - minimum: 0
              type: number
            - type: 'null'
          title: Monthly Cap Usd
      title: SettingsUpdate
      type: object
    SkuMetaIn:
      properties:
        brand:
          title: Brand
          type: string
        category:
          title: Category
          type: string
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        price:
          title: Price
          type: number
        product_type:
          enum:
            - blue_hat
            - sports
            - general_food
            - other
          title: Product Type
          type: string
        sku:
          anyOf:
            - type: string
            - type: 'null'
          title: Sku
      required:
        - brand
        - category
        - product_type
        - price
