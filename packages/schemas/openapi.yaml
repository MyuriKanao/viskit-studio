components:
  schemas:
    ComplianceOut:
      properties:
        advisory:
          title: Advisory
          type: boolean
        locale:
          title: Locale
          type: string
        score:
          title: Score
          type: integer
        violations:
          items:
            $ref: '#/components/schemas/ViolationOut'
          title: Violations
          type: array
      required:
        - score
        - violations
        - advisory
        - locale
      title: ComplianceOut
      type: object
    DetailSectionIn:
      properties:
        id:
          enum:
            - M1
            - M2
            - M3
            - M4
            - M5
            - M6
            - M7
            - M8
            - M9
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceIn'
      required:
        - id
        - three_piece
      title: DetailSectionIn
      type: object
    DetailSectionOut:
      properties:
        id:
          enum:
            - M1
            - M2
            - M3
            - M4
            - M5
            - M6
            - M7
            - M8
            - M9
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceOut'
      required:
        - id
        - three_piece
      title: DetailSectionOut
      type: object
    EditAccepted:
      properties:
        job_id:
          title: Job Id
          type: string
      required:
        - job_id
      title: EditAccepted
      type: object
    EditRequest:
      properties:
        kit_id:
          anyOf:
            - pattern: ^[A-Za-z0-9_-]{1,64}$
              type: string
            - type: 'null'
          description: Optional kit id for MinIO sidecar write; safe-character allowlist guards the object-store path.
          title: Kit Id
        mask_box:
          additionalProperties:
            type: integer
          description: x,y,w,h
          title: Mask Box
          type: object
        new_text:
          title: New Text
          type: string
      required:
        - mask_box
        - new_text
      title: EditRequest
      type: object
    GenerateRequest:
      properties:
        brand_color_hex:
          pattern: ^#[0-9A-Fa-f]{6}$
          title: Brand Color Hex
          type: string
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        spec:
          $ref: '#/components/schemas/SpecIn'
        style_prompt:
          anyOf:
            - type: string
            - type: 'null'
          title: Style Prompt
      required:
        - spec
        - brand_color_hex
        - locale
      title: GenerateRequest
      type: object
    GenerateResponse:
      properties:
        abort_reason:
          anyOf:
            - type: string
            - type: 'null'
          title: Abort Reason
        color_lock_summary:
          additionalProperties:
            type: integer
          title: Color Lock Summary
          type: object
        compliance_path:
          title: Compliance Path
          type: string
        cost_path:
          title: Cost Path
          type: string
        kit_id:
          title: Kit Id
          type: string
        needs_review:
          title: Needs Review
          type: boolean
        png_paths:
          items:
            type: string
          title: Png Paths
          type: array
      required:
        - kit_id
        - png_paths
        - compliance_path
        - cost_path
        - color_lock_summary
        - needs_review
      title: GenerateResponse
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HeroSectionIn:
      properties:
        id:
          enum:
            - H1
            - H2
            - H3
            - H4
            - H5
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceIn'
      required:
        - id
        - three_piece
      title: HeroSectionIn
      type: object
    HeroSectionOut:
      properties:
        id:
          enum:
            - H1
            - H2
            - H3
            - H4
            - H5
          title: Id
          type: string
        three_piece:
          $ref: '#/components/schemas/ThreePieceOut'
      required:
        - id
        - three_piece
      title: HeroSectionOut
      type: object
    KitListItem:
      properties:
        category:
          anyOf:
            - type: string
            - type: 'null'
          title: Category
        id:
          title: Id
          type: integer
        locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Locale
        name:
          title: Name
          type: string
        name_en:
          anyOf:
            - type: string
            - type: 'null'
          title: Name En
        score:
          anyOf:
            - type: integer
            - type: 'null'
          title: Score
        sku:
          title: Sku
          type: string
        status:
          title: Status
          type: string
        thumbs:
          items:
            anyOf:
              - type: string
              - type: 'null'
          title: Thumbs
          type: array
        updated_at:
          anyOf:
            - type: string
            - type: 'null'
          title: Updated At
      required:
        - id
        - sku
        - name
        - name_en
        - status
        - score
        - locale
        - thumbs
      title: KitListItem
      type: object
    KitListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/KitListItem'
          title: Items
          type: array
        total:
          title: Total
          type: integer
      required:
        - items
        - total
      title: KitListResponse
      type: object
    OcrResponse:
      properties:
        boxes:
          items:
            $ref: '#/components/schemas/TextBoxOut'
          title: Boxes
          type: array
        engine:
          title: Engine
          type: string
        version:
          title: Version
          type: string
      required:
        - boxes
        - engine
        - version
      title: OcrResponse
      type: object
    OnboardingNeededResponse:
      properties:
        needs_onboarding:
          title: Needs Onboarding
          type: boolean
      required:
        - needs_onboarding
      title: OnboardingNeededResponse
      type: object
    ProviderHealthRow:
      properties:
        endpoint_id:
          title: Endpoint Id
          type: string
        last_check:
          anyOf:
            - type: string
            - type: 'null'
          title: Last Check
        latency_ms:
          anyOf:
            - type: integer
            - type: 'null'
          title: Latency Ms
        role:
          title: Role
          type: string
        status:
          anyOf:
            - enum:
                - ok
                - warn
                - error
              type: string
            - type: 'null'
          title: Status
        unbound:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Unbound
      required:
        - endpoint_id
        - role
        - status
        - latency_ms
        - last_check
      title: ProviderHealthRow
      type: object
    ProvidersSummaryResponse:
      properties:
        brand_color:
          anyOf:
            - type: string
            - type: 'null'
          title: Brand Color
        default_locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Default Locale
        endpoints_count:
          title: Endpoints Count
          type: integer
        export_preset:
          anyOf:
            - type: string
            - type: 'null'
          title: Export Preset
        monthly_cap_usd:
          anyOf:
            - type: number
            - type: 'null'
          title: Monthly Cap Usd
      required:
        - endpoints_count
        - monthly_cap_usd
        - brand_color
        - default_locale
        - export_preset
      title: ProvidersSummaryResponse
      type: object
    QueueJob:
      properties:
        current_stage:
          title: Current Stage
          type: string
        eta_ms:
          title: Eta Ms
          type: integer
        kit_id:
          title: Kit Id
          type: string
        locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Locale
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        sku:
          anyOf:
            - type: string
            - type: 'null'
          title: Sku
        stages:
          items:
            enum:
              - done
              - active
              - queued
            type: string
          title: Stages
          type: array
      required:
        - kit_id
        - sku
        - name
        - locale
        - stages
        - current_stage
        - eta_ms
      title: QueueJob
      type: object
    SaveEndpointsRequest:
      properties:
        expected_sha256:
          title: Expected Sha256
          type: string
        new_yaml:
          title: New Yaml
          type: string
      required:
        - new_yaml
        - expected_sha256
      title: SaveEndpointsRequest
      type: object
    SaveEndpointsResponse:
      properties:
        new_sha256:
          title: New Sha256
          type: string
      required:
        - new_sha256
      title: SaveEndpointsResponse
      type: object
    SearchHitOut:
      properties:
        image_url:
          title: Image Url
          type: string
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        score:
          title: Score
          type: number
      required:
        - image_url
        - score
        - metadata
      title: SearchHitOut
      type: object
    SearchRequest:
      properties:
        filters:
          $ref: '#/components/schemas/_Filters'
          default: {}
        image:
          title: Image
          type: string
        top_k:
          default: 10
          title: Top K
          type: integer
      required:
        - image
      title: SearchRequest
      type: object
    SearchResponse:
      properties:
        hits:
          items:
            $ref: '#/components/schemas/SearchHitOut'
          title: Hits
          type: array
      required:
        - hits
      title: SearchResponse
      type: object
    SellingPointIn:
      properties:
        evidence:
          title: Evidence
          type: string
        priority:
          enum:
            - high
            - medium
            - low
          title: Priority
          type: string
        title:
          title: Title
          type: string
      required:
        - title
        - priority
        - evidence
      title: SellingPointIn
      type: object
    SkuMetaIn:
      properties:
        brand:
          title: Brand
          type: string
        category:
          title: Category
          type: string
        name:
          title: Name
          type: string
        price:
          title: Price
          type: number
        product_type:
          enum:
            - blue_hat
            - sports
            - general_food
            - other
          title: Product Type
          type: string
        sku:
          title: Sku
          type: string
      required:
        - sku
        - name
        - brand
        - category
        - product_type
        - price
      title: SkuMetaIn
      type: object
    Sparks:
      properties:
        compliance:
          items:
            type: number
          title: Compliance
          type: array
        cost:
          items:
            type: number
          title: Cost
          type: array
        kits:
          items:
            type: integer
          title: Kits
          type: array
      required:
        - kits
        - compliance
        - cost
      title: Sparks
      type: object
    SpecIn:
      properties:
        detail_sections:
          items:
            $ref: '#/components/schemas/DetailSectionIn'
          maxItems: 9
          minItems: 9
          title: Detail Sections
          type: array
        hero_sections:
          items:
            $ref: '#/components/schemas/HeroSectionIn'
          maxItems: 5
          minItems: 5
          title: Hero Sections
          type: array
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        selling_points:
          items:
            $ref: '#/components/schemas/SellingPointIn'
          minItems: 1
          title: Selling Points
          type: array
        sku_meta:
          $ref: '#/components/schemas/SkuMetaIn'
      required:
        - locale
        - sku_meta
        - selling_points
        - hero_sections
        - detail_sections
      title: SpecIn
      type: object
    SpecOut:
      properties:
        detail_sections:
          items:
            $ref: '#/components/schemas/DetailSectionOut'
          maxItems: 9
          minItems: 9
          title: Detail Sections
          type: array
        hero_sections:
          items:
            $ref: '#/components/schemas/HeroSectionOut'
          maxItems: 5
          minItems: 5
          title: Hero Sections
          type: array
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        selling_points:
          items:
            $ref: '#/components/schemas/SellingPointIn'
          title: Selling Points
          type: array
        sku_meta:
          $ref: '#/components/schemas/SkuMetaIn'
      required:
        - locale
        - sku_meta
        - selling_points
        - hero_sections
        - detail_sections
      title: SpecOut
      type: object
    SpecRequest:
      properties:
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        selling_points:
          items:
            $ref: '#/components/schemas/SellingPointIn'
          minItems: 1
          title: Selling Points
          type: array
        sku_meta:
          $ref: '#/components/schemas/SkuMetaIn'
      required:
        - sku_meta
        - selling_points
        - locale
      title: SpecRequest
      type: object
    SpecResponse:
      properties:
        compliance:
          $ref: '#/components/schemas/ComplianceOut'
        spec:
          $ref: '#/components/schemas/SpecOut'
        spec_markdown:
          title: Spec Markdown
          type: string
      required:
        - spec_markdown
        - spec
        - compliance
      title: SpecResponse
      type: object
    StylePromptHitIn:
      description: |-
        A single retrieval hit accepted by ``POST /api/retrieval/style-prompt``.

        Mirrors :class:`SearchHitOut` from the ``/search`` response so the wizard
        can pass selected hits straight through. ``image_path`` is optional —
        the synthesiser only uses ``image_url`` + ``score`` — but we accept it
        when present so round-tripping a search result loses no fields.
      properties:
        image_path:
          default: ''
          title: Image Path
          type: string
        image_url:
          title: Image Url
          type: string
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        score:
          title: Score
          type: number
      required:
        - image_url
        - score
      title: StylePromptHitIn
      type: object
    StylePromptRequest:
      properties:
        hits:
          items:
            $ref: '#/components/schemas/StylePromptHitIn'
          minItems: 1
          title: Hits
          type: array
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
      required:
        - hits
        - locale
      title: StylePromptRequest
      type: object
    StylePromptResponse:
      properties:
        style_prompt:
          title: Style Prompt
          type: string
      required:
        - style_prompt
      title: StylePromptResponse
      type: object
    TextBoxOut:
      properties:
        confidence:
          title: Confidence
          type: number
        h:
          title: H
          type: integer
        text:
          title: Text
          type: string
        w:
          title: W
          type: integer
        x:
          title: X
          type: integer
        'y':
          title: 'Y'
          type: integer
      required:
        - x
        - 'y'
        - w
        - h
        - text
        - confidence
      title: TextBoxOut
      type: object
    ThreePieceIn:
      properties:
        copy:
          title: Copy
          type: string
        design_note:
          title: Design Note
          type: string
        visual:
          title: Visual
          type: string
      required:
        - visual
        - copy
        - design_note
      title: ThreePieceIn
      type: object
    ThreePieceOut:
      description: |-
        Output mirror of ThreePieceIn in kits.py.

        Uses validation_alias + serialization_alias on ``copy_text`` so the public
        JSON key is ``copy`` (matching the SpecIn contract) while the Python
        field name avoids shadowing ``BaseModel.copy()``.
      properties:
        copy:
          title: Copy
          type: string
        design_note:
          title: Design Note
          type: string
        visual:
          title: Visual
          type: string
      required:
        - visual
        - copy
        - design_note
      title: ThreePieceOut
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
        - loc
        - msg
        - type
      title: ValidationError
      type: object
    ViolationOut:
      properties:
        location:
          title: Location
          type: string
        matched_text:
          title: Matched Text
          type: string
        rule_id:
          title: Rule Id
          type: string
        severity:
          enum:
            - hard_block
            - warning
            - advisory
          title: Severity
          type: string
        suggestion:
          anyOf:
            - type: string
            - type: 'null'
          title: Suggestion
      required:
        - rule_id
        - severity
        - location
        - matched_text
      title: ViolationOut
      type: object
    WeeklyMetricsResponse:
      properties:
        api_spend_usd_mtd:
          title: Api Spend Usd Mtd
          type: number
        avg_compliance:
          anyOf:
            - type: number
            - type: 'null'
          title: Avg Compliance
        avg_manual_edit_min:
          anyOf:
            - type: number
            - type: 'null'
          title: Avg Manual Edit Min
        kits_this_week:
          title: Kits This Week
          type: integer
        sparks:
          $ref: '#/components/schemas/Sparks'
      required:
        - kits_this_week
        - avg_compliance
        - avg_manual_edit_min
        - api_spend_usd_mtd
        - sparks
      title: WeeklyMetricsResponse
      type: object
    _Filters:
      properties:
        category:
          anyOf:
            - type: string
            - type: 'null'
          title: Category
        fallback_locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Fallback Locale
        locale:
          anyOf:
            - type: string
            - type: 'null'
          title: Locale
        min_sales:
          anyOf:
            - type: integer
            - type: 'null'
          title: Min Sales
        season:
          anyOf:
            - type: string
            - type: 'null'
          title: Season
      title: _Filters
      type: object
info:
  title: AIShop Studio API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/images/{image_id}/edit:
    post:
      operationId: start_edit_api_images__image_id__edit_post
      parameters:
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditAccepted'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Start Edit
      tags:
        - editor
  /api/images/{image_id}/edit/events:
    get:
      operationId: edit_events_api_images__image_id__edit_events_get
      parameters:
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
        - in: query
          name: job_id
          required: true
          schema:
            title: Job Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Edit Events
      tags:
        - editor
  /api/images/{image_id}/ocr:
    post:
      operationId: ocr_image_api_images__image_id__ocr_post
      parameters:
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcrResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Ocr Image
      tags:
        - editor
  /api/kits:
    get:
      description: |-
        Return kits joined with their product catalog row, paginated & filtered.

        ``thumbs`` is the concatenation of up-to-5 hero png_paths (slot 1..5) and
        up-to-9 detail png_paths (M1..M9) — 14 slots total, NULL-padded for any
        missing rows.  Callers render placeholder cells for NULL entries.

        ``recent`` is advisory; sort defaults to ``created_at DESC`` to preserve
        the EPIC-7 Dashboard call shape (``?recent=true&limit=6``).  Catalog
        (EPIC-8) passes ``offset``, ``status``, ``locale``, ``min_score``,
        ``category``, ``sort``, ``order`` for filtered/paginated views.
      operationId: list_kits_api_kits_get
      parameters:
        - in: query
          name: recent
          required: false
          schema:
            default: false
            title: Recent
            type: boolean
        - in: query
          name: limit
          required: false
          schema:
            default: 6
            maximum: 100
            minimum: 1
            title: Limit
            type: integer
        - in: query
          name: offset
          required: false
          schema:
            default: 0
            minimum: 0
            title: Offset
            type: integer
        - in: query
          name: status
          required: false
          schema:
            anyOf:
              - maxLength: 32
                type: string
              - type: 'null'
            title: Status
        - in: query
          name: locale
          required: false
          schema:
            anyOf:
              - maxLength: 8
                type: string
              - type: 'null'
            title: Locale
        - in: query
          name: min_score
          required: false
          schema:
            anyOf:
              - maximum: 100
                minimum: 0
                type: integer
              - type: 'null'
            title: Min Score
        - in: query
          name: category
          required: false
          schema:
            anyOf:
              - maxLength: 64
                type: string
              - type: 'null'
            title: Category
        - in: query
          name: sort
          required: false
          schema:
            default: created_at
            enum:
              - created_at
              - updated_at
              - score
            title: Sort
            type: string
        - in: query
          name: order
          required: false
          schema:
            default: desc
            enum:
              - asc
              - desc
            title: Order
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KitListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Kits
      tags:
        - imagegen
  /api/kits/{kit_id}/events:
    get:
      description: |-
        Stream per-image status events for *kit_id* as text/event-stream.

        Returns 404 when the kit_id has never been published to the bus
        (callers can use this as a "kit not started" signal).  Each line
        conforms to the SSE wire format::

            data: {"image_id": "H1", "status": "color_locked", "progress": 0,
                   "brand_color_locked": true}
      operationId: get_kit_events_api_kits__kit_id__events_get
      parameters:
        - in: path
          name: kit_id
          required: true
          schema:
            title: Kit Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Kit Events
      tags:
        - imagegen
  /api/kits/{kit_id}/generate:
    post:
      description: Generate the 14-image kit for *kit_id*.
      operationId: post_generate_api_kits__kit_id__generate_post
      parameters:
        - in: path
          name: kit_id
          required: true
          schema:
            title: Kit Id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Post Generate
      tags:
        - imagegen
