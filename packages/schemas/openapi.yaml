          type: array
        sku_meta:
          $ref: '#/components/schemas/SkuMetaIn'
      required:
        - locale
        - sku_meta
        - selling_points
        - hero_sections
        - detail_sections
      title: SpecIn
      type: object
    SpecOut:
      properties:
        detail_sections:
          items:
            $ref: '#/components/schemas/DetailSectionOut'
          maxItems: 9
          minItems: 9
          title: Detail Sections
          type: array
        hero_sections:
          items:
            $ref: '#/components/schemas/HeroSectionOut'
          maxItems: 5
          minItems: 5
          title: Hero Sections
          type: array
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        selling_points:
          items:
            $ref: '#/components/schemas/SellingPointIn'
          title: Selling Points
          type: array
        sku_meta:
          $ref: '#/components/schemas/SkuMetaIn'
      required:
        - locale
        - sku_meta
        - selling_points
        - hero_sections
        - detail_sections
      title: SpecOut
      type: object
    SpecRequest:
      properties:
        locale:
          enum:
            - zh
            - en
          title: Locale
