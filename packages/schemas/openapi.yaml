      required:
        - kits_this_week
        - avg_compliance
        - avg_manual_edit_min
        - api_spend_usd_mtd
        - sparks
      title: WeeklyMetricsResponse
      type: object
info:
  title: Viskit Studio API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/images/{image_id}/edit:
    post:
      operationId: start_edit_api_images__image_id__edit_post
      parameters:
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditAccepted'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Start Edit
      tags:
        - editor
  /api/images/{image_id}/edit/events:
    get:
      operationId: edit_events_api_images__image_id__edit_events_get
      parameters:
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
        - in: query
          name: job_id
          required: true
          schema:
            title: Job Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Edit Events
      tags:
        - editor
  /api/images/{image_id}/ocr:
    post:
      operationId: ocr_image_api_images__image_id__ocr_post
      parameters:
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcrResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Ocr Image
      tags:
        - editor
  /api/kits:
    get:
      description: |-
        Return kits joined with their product catalog row, paginated & filtered.

        ``thumbs`` is the concatenation of up-to-5 hero png_paths (slot 1..5) and
        up-to-9 detail png_paths (M1..M9) — 14 slots total, NULL-padded for any
        missing rows.  Callers render placeholder cells for NULL entries.

        ``recent`` is advisory; sort defaults to ``created_at DESC`` to preserve
        the EPIC-7 Dashboard call shape (``?recent=true&limit=6``).  Catalog
        (EPIC-8) passes ``offset``, ``status``, ``locale``, ``min_score``,
        ``category``, ``sort``, ``order`` for filtered/paginated views.
      operationId: list_kits_api_kits_get
      parameters:
        - in: query
          name: recent
          required: false
          schema:
            default: false
            title: Recent
            type: boolean
        - in: query
          name: limit
          required: false
          schema:
            default: 6
            maximum: 100
            minimum: 1
            title: Limit
            type: integer
        - in: query
          name: offset
          required: false
          schema:
            default: 0
            minimum: 0
            title: Offset
            type: integer
        - in: query
          name: status
          required: false
          schema:
            anyOf:
              - maxLength: 32
                type: string
              - type: 'null'
            title: Status
        - in: query
          name: locale
          required: false
          schema:
            anyOf:
              - maxLength: 8
                type: string
              - type: 'null'
            title: Locale
        - in: query
          name: min_score
          required: false
          schema:
            anyOf:
              - maximum: 100
                minimum: 0
                type: integer
              - type: 'null'
            title: Min Score
        - in: query
          name: category
          required: false
          schema:
            anyOf:
              - maxLength: 64
                type: string
              - type: 'null'
            title: Category
        - in: query
          name: sku
          required: false
          schema:
            anyOf:
              - maxLength: 64
                type: string
              - type: 'null'
            title: Sku
        - in: query
          name: sort
          required: false
          schema:
            default: created_at
            enum:
              - created_at
              - updated_at
              - score
            title: Sort
            type: string
        - in: query
          name: order
          required: false
          schema:
            default: desc
            enum:
              - asc
              - desc
            title: Order
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KitListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Kits
      tags:
        - imagegen
  /api/kits/_warmup/extract:
    get:
      description: |-
        Prime the vision provider connection so the first /extract call is warm.

        Deliberately uses probe(timeout=5) — a 5s deviation from the 30s default
        because this is a best-effort fire-and-forget warmup; we swallow all
        failures and always return 204 so the frontend never sees an error.
      operationId: warmup_extract_api_kits__warmup_extract_get
      responses:
        '204':
          description: Successful Response
      summary: Warmup Extract
      tags:
        - extract
  /api/kits/{db_kit_id}/images/{image_id}:
    delete:
      description: Remove a generated image from a catalog kit slot and delete its PNG.
      operationId: delete_generated_image_api_kits__db_kit_id__images__image_id__delete
      parameters:
        - in: path
          name: db_kit_id
          required: true
          schema:
            title: Db Kit Id
            type: integer
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteKitImageResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete Generated Image
      tags:
        - imagegen
  /api/kits/{db_kit_id}/meta:
    get:
      description: Read result sidecars for *db_kit_id*; 404 if the kit root is unknown.
      operationId: get_kit_meta_api_kits__db_kit_id__meta_get
      parameters:
        - in: path
          name: db_kit_id
          required: true
          schema:
            title: Db Kit Id
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KitMetaResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Kit Meta
      tags:
        - imagegen
  /api/kits/{kit_id}/events:
    get:
      description: |-
        Stream per-image status events for *kit_id* as text/event-stream.

        Returns 404 when the kit_id has never been published to the bus
        (callers can use this as a "kit not started" signal).  Each line
        conforms to the SSE wire format::

            data: {"image_id": "H1", "status": "color_locked", "progress": 0,
                   "brand_color_locked": true}
      operationId: get_kit_events_api_kits__kit_id__events_get
      parameters:
        - in: path
          name: kit_id
          required: true
          schema:
            title: Kit Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Kit Events
      tags:
        - imagegen
  /api/kits/{kit_id}/extract:
    post:
      description: |-
        Extract per-field inferences from a product image.

        Uses the vision provider (registry role "vision"); falls back to "llm" if
        the vision role is unavailable (R2 mitigation).

        Reserved-prefix guard: POST to kit_id='_warmup' returns 404 — defensive
        against POST collision with the GET /_warmup/extract warmup endpoint.
      operationId: extract_api_kits__kit_id__extract_post
      parameters:
        - in: path
          name: kit_id
          required: true
          schema:
            title: Kit Id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Extract
      tags:
        - extract
  /api/kits/{kit_id}/generate:
    post:
      description: Generate the 14-image kit for *kit_id*.
      operationId: post_generate_api_kits__kit_id__generate_post
      parameters:
        - in: path
          name: kit_id
          required: true
          schema:
            title: Kit Id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Post Generate
      tags:
        - imagegen
  /api/kits/{kit_id}/images/{image_id}:
    get:
      description: Serve a generated kit image by public kit id and slot id.
      operationId: get_generated_image_api_kits__kit_id__images__image_id__get
      parameters:
        - in: path
          name: kit_id
          required: true
          schema:
            title: Kit Id
            type: string
        - in: path
          name: image_id
          required: true
          schema:
            title: Image Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Generated Image
      tags:
        - imagegen
  /api/kits/{kit_id}/spec:
    post:
      description: Generate the marketing spec for *kit_id* under the requested locale.
      operationId: create_spec_api_kits__kit_id__spec_post
      parameters:
        - in: path
          name: kit_id
          required: true
          schema:
            title: Kit Id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Spec
      tags:
        - copywriter
  /api/metrics/weekly:
    get:
      description: Aggregate live metrics — current-ISO-week kits + 12-week sparklines.
      operationId: get_weekly_metrics_api_metrics_weekly_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyMetricsResponse'
          description: Successful Response
      summary: Get Weekly Metrics
      tags:
        - metrics
  /api/onboarding/needed:
    get:
      description: Return whether onboarding is needed for this workspace.
      operationId: get_onboarding_needed_api_onboarding_needed_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingNeededResponse'
          description: Successful Response
      summary: Get Onboarding Needed
      tags:
        - onboarding
  /api/providers/config-state:
    get:
      description: |-
        Return the on-disk YAML body and its SHA-256 checksum.

        Kept for legacy/admin tools that need an explicit config-body save path.
        Bootstrapping the live config file is a lifespan concern
        (``apps.api.main._bootstrap_config_if_missing``), so this route is
        side-effect-free; if the file truly doesn't exist, 404.
      operationId: get_config_state_api_providers_config_state_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigStateResponse'
          description: Successful Response
      summary: Get Config State
      tags:
        - providers
  /api/providers/endpoints:
    post:
      description: Save the new config YAML body.  ADR-010 v2 lock+checksum semantics.
      operationId: save_endpoints_api_providers_endpoints_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveEndpointsRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveEndpointsResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Save Endpoints
      tags:
        - providers
  /api/providers/endpoints/{role}:
    delete:
      description: |-
        Remove a role's stanza from config.yaml and re-boot the registry.

        Read-modify-write under the same lock+checksum protocol as POST.  Missing
        role → 404.  Required roles (``REQUIRED_ROLES``) → 409; deleting them
        would crash the next startup with ERR-PROV-001.  Use PUT to swap settings.
      operationId: delete_endpoint_api_providers_endpoints__role__delete
      parameters:
        - in: path
          name: role
          required: true
          schema:
            title: Role
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveEndpointsResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete Endpoint
      tags:
        - providers
    get:
      description: Return the structured stanza for *role* so the UI can prefill the edit modal.
      operationId: get_endpoint_api_providers_endpoints__role__get
      parameters:
        - in: path
          name: role
          required: true
          schema:
            title: Role
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointStanza'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Endpoint
      tags:
        - providers
    post:
      description: Create a single role stanza without exposing YAML editing to the UI.
      operationId: create_endpoint_api_providers_endpoints__role__post
      parameters:
        - in: path
          name: role
          required: true
          schema:
            title: Role
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEndpointRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveEndpointsResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Endpoint
      tags:
        - providers
    put:
      description: |-
        Replace a single role's stanza.

        ``api_key`` semantics: ``None``, empty string, and whitespace-only all
        mean "preserve the existing env-var binding on disk".  Any other value
        is persisted to the secrets store and the YAML's ``api_key_env`` is
        rewritten to the derived env name.  To explicitly unbind, DELETE the
        role and re-POST.
      operationId: update_endpoint_api_providers_endpoints__role__put
      parameters:
        - in: path
          name: role
          required: true
          schema:
            title: Role
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEndpointRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveEndpointsResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update Endpoint
      tags:
        - providers
