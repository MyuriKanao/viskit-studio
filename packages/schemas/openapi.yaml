  /api/retrieval/style-prompt:
    post:
      description: |-
        Synthesise a ≤100-word ``style_prompt`` from selected retrieval hits.

        Calls :func:`services.imagegen.style_synthesizer.synthesize_style` via the
        ``vision`` provider role.  The result is non-empty (the synthesiser raises
        on empty adapter responses) and capped at 100 words.

        Errors:
            - 503 when ``app.state.registry`` is not booted.
            - 502 when the vision adapter returns an empty prompt
              (:class:`StyleSynthesisError`).
      operationId: style_prompt_api_retrieval_style_prompt_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StylePromptRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StylePromptResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Style Prompt
      tags:
        - retrieval
  /health:
    get:
      description: |-
        Probe Postgres, Milvus, Redis, MinIO concurrently with a 2s timeout each.
        Returns overall status 'ok' if all four connected, else 'degraded'.
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health
