      type: object
    Sparks:
      properties:
        compliance:
          items:
            type: number
          title: Compliance
          type: array
        cost:
          items:
            type: number
          title: Cost
          type: array
        kits:
          items:
            type: integer
          title: Kits
          type: array
      required:
        - kits
        - compliance
        - cost
      title: Sparks
      type: object
    SpecIn:
      properties:
        detail_sections:
          items:
            $ref: '#/components/schemas/DetailSectionIn'
          maxItems: 9
          minItems: 9
          title: Detail Sections
          type: array
        hero_sections:
          items:
            $ref: '#/components/schemas/HeroSectionIn'
          maxItems: 5
          minItems: 5
          title: Hero Sections
          type: array
        locale:
          enum:
            - zh
            - en
          title: Locale
          type: string
        selling_points:
          items:
            $ref: '#/components/schemas/SellingPointIn'
          minItems: 1
